model:
  backbone: "efficientnet"
  pretrained: true
  num_classes: 21

data:
  root: "/content/data"
  dataset_name: "pascal_voc"
  years: ["2007", "2012"]
  crop_size: 320
  download: false
  num_workers: 4
  pin_memory: true
  preload: true
  coco:
    enabled: true
    img_root: "/content/coco/train2017"
    ann_file: "/content/coco/annotations/instances_train2017.json"
    filter_empty: true
    overlap_policy: "smallest_first"
    mask_cache_dir: "/content/coco/voc_masks"

training:
  batch_size: 48
  val_batch_size: 16
  total_iters: 110000
  log_interval: 100
  eval_interval: 2000
  learning_rate: 1.4e-3
  weight_decay: 1.0e-4
  resume: false
  # Set this only when reproducing the V67 warm-start training path.
  finetune_from: ""
  freeze_iters: 0
  backbone_lr_scale: 0.05
  warmup_iters: 300
  amp: true
  lovasz_weight: 0.5
  ema: true
  ema_decay: 0.9998
  ema_update_every: 1
  ema_eval_interval: 4000

checkpoint:
  path: "checkpoints/model.pth"

wandb:
  team: "tmdgk115-sungkyunkwan-university"
  project: "osai-project01"
  run_name: "EfficientNet_V67"

device: "cuda"
seed: 42
