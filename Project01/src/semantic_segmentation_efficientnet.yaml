model:
  num_classes: 21

data:
  root: "/content/data"
  dataset_name: "pascal_voc"
  years: ["2007", "2012"]
  num_workers: 2
  crop_size: 320
  download: false
  pin_memory: true

training:
  batch_size: 16
  total_iters: 30000        # iteration 기반 학습
  log_interval: 100         # N iter마다 train 지표 wandb 기록
  eval_interval: 1000       # N iter마다 검증 실행
  learning_rate: 1.0e-3
  weight_decay: 1.0e-4
  resume: false             # true: 체크포인트 이어받기 / false: 처음부터 학습
  freeze_iters: 3000        # N iter까지 backbone freeze (0이면 비활성화)
  backbone_lr_scale: 0.1   # backbone lr = learning_rate × backbone_lr_scale

wandb:
  team: "tmdgk115-sungkyunkwan-university"
  project: "osai-project01"
  run_name: "efficientnet-b0"

device: "cuda"
seed: 42
