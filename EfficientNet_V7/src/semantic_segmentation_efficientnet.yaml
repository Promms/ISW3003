model:
  backbone: "efficientnet"   # B1 (V7)
  num_classes: 21

data:
  root: "/content/data"
  dataset_name: "pascal_voc"
  years: ["2007", "2012"]
  num_workers: 4           # COCO 디스크 I/O bound 환경에서 4가 2보다 유리 (V5_2 baseline)
  crop_size: 320           # V5_2 baseline 값
  download: false
  pin_memory: true
  preload: true              # VOC 전체 RAM 적재 (~2GB). COCO 합류해도 VOC만 preload는 유지 OK
  coco:                      # COCO 2017 → VOC 21-class 매핑 합류 (enabled=false로 끌 수 있음)
    enabled: true
    img_root: "/content/coco/train2017"
    ann_file: "/content/coco/annotations/instances_train2017.json"
    filter_empty: true       # VOC 매핑 클래스 없는 이미지 제외 (~118k → ~65k)
    overlap_policy: "smallest_first"
    mask_cache_dir: "/content/coco/voc_masks"   # 사전 렌더된 VOC-index PNG 폴더
                                                # 없으면 annToMask 폴백 (학습 2~3배 느려짐)

training:
  batch_size: 32             # V5_2 baseline 값
  val_batch_size: 16         # val은 no_grad. DiceLoss one-hot 때문에 train batch 보단 낮춤
  total_iters: 80000         # V5_2가 70~80k에서 plateau → 100k는 끝부분 LR 낭비. 80k로 단축
  log_interval: 100
  eval_interval: 4000        # 100k / 25회
  learning_rate: 1.4e-3      # V3 값 복귀 (COCO 합류하면 pretrained 보존 중요)
  weight_decay: 1.0e-4
  resume: false              # true: 기존 best_{run_name}.pth 에서 이어받기 / false: 처음부터
  freeze_iters: 2000         # V4 1000은 너무 짧음 (head 안정화 부족) → 2000 복귀
  backbone_lr_scale: 0.15    # COCO 대량 합류 시 pretrained 파괴 방지 목적 (0.25 → 0.15)
  warmup_iters: 500          # 초반 500 iter 선형 warmup (COCO 분포 다양성에 대응)
  amp: true
  ema_update_every: 1       # V5_2 baseline. 8로 두면 EMA half-life가 8배 늘어 80k 학습엔 부족 (random 잔존)
  # --- EMA ---
  ema: true
  ema_decay: 0.9998
  ema_eval_interval: 10000

checkpoint:
  dir: "/content/drive/MyDrive/checkpoints"   # 체크포인트 저장 폴더
  # 파일명은 자동으로 "best_{run_name}.pth" — run_name 바꾸면 다른 파일로 저장됨
  # (예: run_name="EfficientNet_V5" → best_EfficientNet_V5.pth)

wandb:
  team: "tmdgk115-sungkyunkwan-university"
  project: "osai-project01"
  run_name: "EfficientNet_V7_B1"

device: "cuda"
seed: 42
