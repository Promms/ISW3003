model:
  backbone: "efficientnet"   # B1 (V7)
  num_classes: 21

data:
  root: "/content/data"
  dataset_name: "pascal_voc"
  years: ["2007", "2012"]
  num_workers: 4           # COCO 디스크 I/O bound 환경에서 4가 2보다 유리 (V5_2 baseline)
  crop_size: 320           # V5_2 baseline 값
  download: false
  pin_memory: true
  preload: true              # VOC 전체 RAM 적재 (~2GB). COCO 합류해도 VOC만 preload는 유지 OK
  coco:                      # COCO 2017 → VOC 21-class 매핑 합류 (enabled=false로 끌 수 있음)
    enabled: true
    img_root: "/content/coco/train2017"
    ann_file: "/content/coco/annotations/instances_train2017.json"
    filter_empty: true       # VOC 매핑 클래스 없는 이미지 제외 (~118k → ~65k)
    overlap_policy: "smallest_first"
    mask_cache_dir: "/content/coco/voc_masks"   # 사전 렌더된 VOC-index PNG 폴더
                                                # 없으면 annToMask 폴백 (학습 2~3배 느려짐)

training:
  batch_size: 48
  val_batch_size: 16
  total_iters: 116000        # V7(86k) 이후 Lovasz fine-tuning 30k
  log_interval: 100
  eval_interval: 2000        # 30k / 15회
  learning_rate: 1.4e-3      # V7과 동일, 110k 기준 poly로 80k 시점 자연스럽게 감쇠
  weight_decay: 1.0e-4
  resume: false              # crash 후 이어받을 때만 true
  finetune_from: "/content/drive/MyDrive/checkpoints/best_raw_EfficientNet_V7_B1.pth"
  freeze_iters: 0            # fine-tuning: freeze 없음
  backbone_lr_scale: 0.05    # 백본 거의 고정, head만 집중 업데이트
  warmup_iters: 300          # 새 optimizer 안정화용 warmup
  amp: true
  ema_update_every: 1
  lovasz_weight: 0.5         # CE + 1.0*Dice + 0.5*Lovasz
  # --- EMA ---
  ema: true
  ema_decay: 0.9998
  ema_eval_interval: 4000

checkpoint:
  dir: "/content/drive/MyDrive/checkpoints"   # 체크포인트 저장 폴더
  # 파일명은 자동으로 "best_{run_name}.pth" — run_name 바꾸면 다른 파일로 저장됨
  # (예: run_name="EfficientNet_V5" → best_EfficientNet_V5.pth)

wandb:
  team: "tmdgk115-sungkyunkwan-university"
  project: "osai-project01"
  run_name: "EfficientNet_V67"

device: "cuda"
seed: 42
